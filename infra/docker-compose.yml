version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: novalake-postgres
    environment:
      POSTGRES_USER: novalake
      POSTGRES_PASSWORD: novalake
      POSTGRES_DB: novalake_ops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../sql/postgres_init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novalake -d novalake_ops"]
      interval: 10s
      timeout: 5s
      retries: 5

  spark-master:
    image: bitnami/spark:3.5.1
    container_name: novalake-spark-master
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ../:/opt/novalake
    working_dir: /opt/novalake

  spark-worker:
    image: bitnami/spark:3.5.1
    container_name: novalake-spark-worker
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
    ports:
      - "8081:8081"
    volumes:
      - ../:/opt/novalake
    working_dir: /opt/novalake

volumes:
  postgres_data:
